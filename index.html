<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemix | artemixai.com</title>
    <style>
        :root { --bg: #0d0d0d; --sidebar: #171717; --accent: #10a37f; --text: #ececec; --border: #333; }
        
        * { box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        .logo { color: var(--accent); letter-spacing: 3px; font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        .domain { font-size: 0.7rem; color: #555; margin-bottom: 25px; }
        
        button.new-chat { background: var(--accent); color: black; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button.new-chat:hover { background: #14c096; }

        #history { flex-grow: 1; overflow-y: auto; margin-top: 20px; }
        .history-item { padding: 10px; border-radius: 8px; cursor: pointer; color: #aaa; font-size: 0.85rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item:hover { background: #2a2a2a; color: white; }

        /* Area Principale */
        #main { flex-grow: 1; display: flex; flex-direction: column; position: relative; height: 100vh; }

        /* Top Bar con Lingue */
        #top-bar { height: 60px; display: flex; justify-content: flex-end; align-items: center; padding: 0 30px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        select { background: #222; color: #fff; border: 1px solid var(--border); padding: 8px 15px; border-radius: 20px; outline: none; cursor: pointer; }

        /* Finestra Chat */
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 40px 15% 180px; display: flex; flex-direction: column; gap: 30px; scroll-behavior: smooth; }
        
        .msg { max-width: 85%; line-height: 1.7; font-size: 1rem; }
        .user-msg { align-self: flex-end; background: #2f2f2f; padding: 12px 20px; border-radius: 18px 18px 0 18px; border: 1px solid #444; }
        .ai-msg { align-self: flex-start; width: 100%; padding-bottom: 20px; border-bottom: 1px solid #1f1f23; }

        /* BARRA INPUT INTERA */
        .input-container { position: absolute; bottom: 0; left: 0; right: 0; padding: 30px 15% 40px; background: linear-gradient(to top, var(--bg) 80%, transparent); }
        .input-bar { background: #212121; border: 1px solid var(--border); border-radius: 15px; display: flex; align-items: center; padding: 10px 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); gap: 15px; }
        
        input[type="text"] { flex-grow: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; padding: 10px 0; }
        .send-btn { background: var(--accent); color: black; border: none; width: 40px; height: 40px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.2rem; }

        /* Animazione Caricamento */
        .dots { display: flex; gap: 5px; padding: 10px 0; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; } 40% { transform: scale(1.1); opacity: 1; } }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="logo">ARTEMIX</div>
    <div class="domain">artemixai.com</div>
    <button class="new-chat" onclick="resetChat()">+ Nuova Chat</button>
    <div id="history"></div>
</div>

<div id="main">
    <div id="top-bar">
        <select id="lang">
            <option value="Italiano">🇮🇹 Italiano</option>
            <option value="English">🇺🇸 English</option>
            <option value="Español">🇪🇸 Español</option>
            <option value="Français">🇫🇷 Français</option>
            <option value="Deutsch">🇩🇪 Deutsch</option>
        </select>
    </div>

    <div id="chat-window"></div>

    <div class="input-container">
        <div class="input-bar">
            <input type="file" id="fileIn" hidden onchange="alert('File pronto!')">
            <button onclick="document.getElementById('fileIn').click()" style="background:none; border:none; color:#777; cursor:pointer; font-size:1.4rem;">📎</button>
            <input type="text" id="userInput" placeholder="Chiedi ad Artemix..." onkeydown="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">↑</button>
        </div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyDrmPPK-YuFU21T5yYLxyxZWPCvdZOnEyg";
    const MODEL = "gemini-2.5-flash"; 
    let chatLog = [];

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user-msg');
        input.value = "";
        
        const loader = showLoader();
        chatLog.push({ role: "user", parts: [{ text: `[Rispondi in ${document.getElementById('lang').value}] ${text}` }] });

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: chatLog })
            });
            const data = await resp.json();
            loader.remove();

            const aiResp = data.candidates[0].content.parts[0].text;
            addMsg(aiResp, 'ai-msg');
            chatLog.push({ role: "model", parts: [{ text: aiResp }] });
        } catch (e) {
            loader.remove();
            addMsg("Errore: Verifica API Key o Modello.", 'ai-msg');
        }
    }

    function addMsg(t, c) {
        const win = document.getElementById('chat-window');
        const d = document.createElement('div');
        d.className = `msg ${c}`;
        d.innerHTML = t.replace(/\n/g, '<br>');
        win.appendChild(d);
        win.scrollTop = win.scrollHeight;
    }

    function showLoader() {
        const win = document.getElementById('chat-window');
        const l = document.createElement('div');
        l.className = 'dots';
        l.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
        win.appendChild(l);
        win.scrollTop = win.scrollHeight;
        return l;
    }

    function resetChat() {
        document.getElementById('chat-window').innerHTML = "";
        chatLog = [];
    }
</script>
</body>
</html>
