<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Artemix | artemixai.com</title>
    <style>
        :root { --bg: #0d0d0d; --sidebar: #171717; --accent: #10a37f; --text: #ececec; --border: #333; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        .history-item { padding: 12px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; margin-bottom: 8px; color: #aaa; transition: 0.3s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item:hover { background: #2a2a2a; color: white; }

        /* Top Bar */
        #top-bar { position: absolute; top: 0; right: 0; left: 280px; height: 60px; display: flex; justify-content: flex-end; align-items: center; padding: 0 30px; z-index: 10; }
        #lang-selector { background: #222; color: #fff; border: 1px solid var(--border); padding: 8px 15px; border-radius: 20px; cursor: pointer; outline: none; }

        /* Main Area */
        #main { flex-grow: 1; display: flex; flex-direction: column; position: relative; height: 100vh; padding-top: 60px; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 20px 5% 150px; display: flex; flex-direction: column; gap: 25px; scroll-behavior: smooth; }
        
        /* Barra di Input INTERA */
        .input-area { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            padding: 30px 5%; 
            background: linear-gradient(transparent, var(--bg) 30%);
        }
        .input-bar { 
            background: #212121; 
            border: 1px solid var(--border); 
            border-radius: 25px; 
            display: flex; 
            align-items: center; 
            padding: 12px 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            gap: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"] { flex-grow: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; }
        .send-btn { background: var(--accent); color: black; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: bold; flex-shrink: 0; }

        /* Messaggi e Animazioni */
        .msg { max-width: 85%; line-height: 1.7; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: #2f2f2f; padding: 15px 25px; border-radius: 20px 20px 5px 20px; border: 1px solid #444; }
        .artemix-msg { align-self: flex-start; width: 100%; border-bottom: 1px solid #1f1f23; padding-bottom: 30px; }
        .typing { display: flex; gap: 6px; padding: 15px 0; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; } 40% { transform: scale(1.1); opacity: 1; } }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color:var(--accent); letter-spacing: 3px;">ARTEMIX</h2>
    <button onclick="newChat()" style="background:var(--accent); color:black; border:none; padding:12px; border-radius:10px; cursor:pointer; font-weight:bold; margin: 20px 0;">+ Nuova Chat</button>
    <div id="chat-history" style="overflow-y:auto; flex-grow:1;"></div>
</div>

<div id="main">
    <div id="top-bar"><select id="lang-selector"></select></div>
    <div id="chat-window"></div>
    <div class="input-area">
        <div class="input-bar">
            <input type="file" id="fileIn" hidden onchange="handleFile()">
            <button onclick="document.getElementById('fileIn').click()" style="background:none; border:none; color:#888; cursor:pointer; font-size:1.3rem;">📎</button>
            <input type="text" id="userIn" placeholder="Chiedi ad Artemix..." onkeydown="if(event.key==='Enter') startProcess()">
            <button class="send-btn" onclick="startProcess()">↑</button>
        </div>
    </div>
</div>

<script>
    const KEY = "AIzaSyDrmPPK-YuFU21T5yYLxyxZWPCvdZOnEyg";
    const MODEL = "gemini-2.5-flash"; 
    let currentSession = [];
    let sessions = JSON.parse(localStorage.getItem('artemix_v16')) || [];
    let activeFile = null;

    // Lingue
    const languages = [
        {n:"Italiano", e:"🇮🇹"}, {n:"English", e:"🇺🇸"}, {n:"Español", e:"🇪🇸"}, {n:"Français", e:"🇫🇷"}, {n:"Deutsch", e:"🇩🇪"}
    ];
    const sel = document.getElementById('lang-selector');
    languages.forEach(l => {
        let o = document.createElement('option');
        o.value = l.n; o.innerText = `${l.e} ${l.n}`;
        sel.appendChild(o);
    });

    window.onload = renderHistory;

    function handleFile() {
        const file = document.getElementById('fileIn').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            activeFile = { inlineData: { data: e.target.result.split(',')[1], mimeType: file.type } };
            alert("File caricato!");
        };
        reader.readAsDataURL(file);
    }

    async function startProcess() {
        const input = document.getElementById('userIn');
        const text = input.value.trim();
        if(!text && !activeFile) return;

        addUI(text || "Analisi file", 'user-msg');
        input.value = "";
        const loader = showDots();

        let userContent = { role: "user", parts: [{ text: `[System: Rispondi in ${sel.value}] ${text}` }] };
        if(activeFile) userContent.parts.push(activeFile);
        currentSession.push(userContent);

        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${KEY}`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ contents: currentSession })
            });
            const d = await r.json();
            loader.remove();

            const aiText = d.candidates[0].content.parts[0].text;
            addUI(aiText, 'artemix-msg');
            currentSession.push({ role: "model", parts: [{ text: aiText }] });

            if(currentSession.length <= 2) {
                sessions.unshift({ id: Date.now(), title: text.slice(0,25), data: [...currentSession] });
                localStorage.setItem('artemix_v16', JSON.stringify(sessions));
                renderHistory();
            }
            activeFile = null;
        } catch(e) {
            loader.remove();
            addUI("Errore di connessione.", 'artemix-msg');
        }
    }

    function renderHistory() {
        const h = document.getElementById('chat-history');
        h.innerHTML = "";
        sessions.forEach((s, i) => {
            const d = document.createElement('div');
            d.className = 'history-item';
            d.innerText = "💬 " + s.title;
            d.onclick = () => {
                currentSession = s.data;
                document.getElementById('chat-window').innerHTML = "";
                currentSession.forEach(m => addUI(m.parts[0].text.replace(/\[System:.*?\] /, ""), m.role === 'user' ? 'user-msg' : 'artemix-msg'));
            };
            h.appendChild(d);
        });
    }

    function newChat() {
        currentSession = [];
        document.getElementById('chat-window').innerHTML = "";
    }

    function addUI(t, c) {
        const win = document.getElementById('chat-window');
        const d = document.createElement('div');
        d.className = `msg ${c}`;
        d.innerHTML = t.replace(/\n/g, '<br>');
        win.appendChild(d);
        win.scrollTop = win.scrollHeight;
    }

    function showDots() {
        const win = document.getElementById('chat-window');
        const l = document.createElement('div');
        l.className = 'typing';
        l.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
        win.appendChild(l);
        win.scrollTop = win.scrollHeight;
        return l;
    }
</script>
</body>
</html>
