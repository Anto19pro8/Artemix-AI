<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemix AI</title>
    <style>
        :root { --bg: #0d0d0d; --sidebar: #171717; --accent: #10a37f; --text: #ececec; --border: #333; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR MOBILE-FRIENDLY */
        #sidebar { 
            width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 20px; transition: 0.3s; z-index: 1000;
        }

        @media (max-width: 768px) {
            #sidebar { position: fixed; left: -280px; height: 100%; width: 280px; }
            #sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.8); }
        }

        #main { flex-grow: 1; display: flex; flex-direction: column; position: relative; width: 100%; }
        
        #menu-toggle {
            display: none; position: fixed; top: 15px; left: 15px; z-index: 900;
            background: var(--accent); border: none; color: black; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        #close-sidebar { display: none; align-self: flex-end; font-size: 30px; cursor: pointer; color: var(--accent); margin-bottom: 20px; }
        @media (max-width: 768px) { #menu-toggle, #close-sidebar { display: block; } }

        #chat-window { flex-grow: 1; overflow-y: auto; padding: 70px 5% 150px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 15px; max-width: 85%; line-height: 1.5; }
        .user-msg { background: #2f2f2f; align-self: flex-end; color: white; }
        .ai-msg { background: transparent; align-self: flex-start; color: var(--text); border: 1px solid var(--border); }

        .input-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(transparent, var(--bg) 40%); }
        .input-bar { background: #212121; border: 1px solid var(--border); border-radius: 15px; display: flex; align-items: center; padding: 5px 15px; max-width: 800px; margin: 0 auto; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }
        #send-btn { background: var(--accent); border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; color: black; font-weight: bold; }

        .dots { display: flex; gap: 5px; padding: 10px; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

    <button id="menu-toggle">☰ Menu</button>

    <div id="sidebar">
        <span id="close-sidebar">×</span>
        <h2 style="color:var(--accent); margin-top:0;">ARTEMIX</h2>
        <select id="lang" style="background:#222; color:white; border:1px solid #444; padding:8px; border-radius:5px; margin-bottom:10px;">
            <option value="Italiano">Italiano</option>
            <option value="English">English</option>
        </select>
        <button onclick="resetChat()" style="background:var(--accent); border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold; color:black;">+ Nuova Chat</button>
    </div>

    <div id="main">
        <div id="chat-window"></div>
        <div class="input-area">
            <div class="input-bar">
