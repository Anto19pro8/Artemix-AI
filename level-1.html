<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ffb3d9">
  <title>Livello 1 · Claw Quest</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="level" data-level="1" class="bg-sparkles level-theme-1">
  <header class="hud">
    <div class="hud-stat"><span>Livello</span><strong id="hud-level">1</strong></div>
    <div class="hud-stat"><span>Monete</span><strong id="hud-coins">0</strong></div>
    <div class="hud-stat"><span>Ingressi</span><strong id="hud-qr">0</strong></div>
  </header>
  <main class="game-main level-main">
    <div class="title-bar level-hero"><h1 id="level-title">Livello 1</h1><p id="level-subtitle">Claw Machine</p></div>
    <section class="claw-section claw-hero">
      <div class="claw-machine"><div class="claw-rail"></div>
        <div id="claw-arm"><div class="claw-string"></div><div class="claw-head">🦀</div></div>
        <div id="claw-prize">🥚</div><div id="claw-zone"></div>
      </div>
    </section>
    <div id="pet-arena"></div>
    <div class="music-row"><label for="music-upload">🎵 Musica</label><input type="file" id="music-upload" accept="audio/*"><button type="button" class="btn-bubble secondary" id="music-toggle">Play/Pausa</button></div>
    <a href="index.html" class="btn-bubble secondary scan-again">✏️ Altro codice</a>
  </main>
  <nav class="nav-dock">
    <button type="button" class="nav-btn" data-nav="index.html"><span class="icon">✏️</span>Codice</button>
    <button type="button" class="nav-btn" data-nav="inventory.html"><span class="icon">🎒</span>Inventario</button>
    <button type="button" class="nav-btn" data-nav="shop.html"><span class="icon">🛒</span>Negozio</button>
  </nav>
  <div id="naming-modal" class="modal"><div class="modal-card"><h2>Dai un nome al tuo cucciolo 💖</h2><div id="egg-reveal">🥚</div><input type="text" id="pet-name-input" placeholder="Nome kawaii..." maxlength="20"><button type="button" class="btn-bubble" id="pet-name-confirm">Conferma ✨</button><button type="button" class="btn-bubble secondary" id="pet-name-skip">Nome casuale 🎀</button></div></div>
  <div id="trophy-popup" class="modal"><div class="modal-card"><div id="trophy-popup-body"></div><button type="button" class="btn-bubble" onclick="ClawUI.showModal('trophy-popup',false)">Yay! 💖</button></div></div>
  <audio id="bg-music"></audio>
  <script src="../js/save.js"></script><script src="../js/codes.js"></script><script src="../js/pets.js"></script><script src="../js/ui.js"></script><script src="../js/game.js"></script>
</body>
</html>
