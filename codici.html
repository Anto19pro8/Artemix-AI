  <title>Codici livelli · Claw Quest</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Nunito, system-ui, sans-serif;
      text-align: center;
      padding: 20px 16px 40px;
      background: linear-gradient(180deg, #fff5fb, #ffe8f4);

    .codes-table {
      width: 100%;
      max-width: 360px;
      margin: 0 auto 1.5rem;
      border-collapse: collapse;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(255, 110, 180, 0.15);
    }
    .codes-table th, .codes-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #ffe0f0;
      font-size: 0.9rem;
    }
    .codes-table th { background: #ffb3d9; color: #fff; font-weight: 800; }
    .codes-table tr:last-child td { border-bottom: none; }
    .code-digits {
      font-family: ui-monospace, monospace;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      color: #ff6eb4;
    }
    .back {
      display: inline-block;
      margin-top: 1rem;
      padding: 10px 20px;
      border-radius: 999px;
      background: #ff8ec8;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }

</head>
